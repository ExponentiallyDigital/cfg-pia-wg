<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 955" width="100%" preserveAspectRatio="xMidYMid meet" style="max-width:1200px;height:auto;font-family:'Segoe UI',Arial,sans-serif;background:#ffffff" role="img" aria-labelledby="t d">
  <title id="t">PIA WireGuard Config — Network Traffic Flow</title>
  <desc id="d">Corrected topology: the device sits behind the router (NAT gateway); all device traffic traverses the router. Control-plane HTTPS/TCP flows reach PIA Infrastructure; the data plane is the WireGuard tunnel Router-WG server, then PIA internal network, public IP pool, Internet and external services (GitHub CDN CA cert, DNS, web links).</desc>

  <defs>
    <style>
      .zt{font:700 14px 'Segoe UI',Arial,sans-serif}
      .nt{font:700 14px 'Segoe UI',Arial,sans-serif;fill:#102027}
      .ns{font:12px 'Segoe UI',Arial,sans-serif;fill:#455A64}
      .nss{font:11px 'Segoe UI',Arial,sans-serif;fill:#546E7A}
      .lb{font:12px 'Segoe UI',Arial,sans-serif}
      .lbg{fill:#ffffff;fill-opacity:.86}
      .flow{fill:none;stroke-width:2.6}
      .enc{fill:none;stroke-width:2.2;stroke-dasharray:8 5}
    </style>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1E88E5"/></marker>
    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#FF9800"/></marker>
    <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9C27B0"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4CAF50"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#F44336"/></marker>
    <marker id="ay" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9E9E9E"/></marker>
    <marker id="asl" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#455A64"/></marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="700" y="32" text-anchor="middle" style="font:700 23px 'Segoe UI',Arial,sans-serif;fill:#102027">PIA WireGuard Config — Network Traffic Flow</text>
  <text x="700" y="55" text-anchor="middle" style="font:12px 'Segoe UI',Arial,sans-serif;fill:#607D8B">Device sits behind the router (NAT gateway): every flow traverses the router — nothing reaches the device except via the router.</text>
  <text x="700" y="73" text-anchor="middle" style="font:12px 'Segoe UI',Arial,sans-serif;fill:#2E7D32">VPN egress/ingress: Router ⇄ UDP 51820 tunnel ⇄ PIA WireGuard server ⇄ PIA internal net ⇄ public IP pool ⇄ Internet ⇄ external services.</text>

  <!-- ===================== ZONES ===================== -->
  <rect x="30" y="90" width="290" height="660" rx="14" fill="#E3F2FD" fill-opacity="0.35" stroke="#90CAF9" stroke-dasharray="6 5"/>
  <text x="46" y="112" class="zt" fill="#1565C0">Local Network (192.168.1.0/24)</text>

  <rect x="360" y="90" width="360" height="660" rx="14" fill="#F3E5F5" fill-opacity="0.30" stroke="#CE93D8" stroke-dasharray="6 5"/>
  <text x="376" y="112" class="zt" fill="#6A1B9A">PIA Infrastructure</text>

  <rect x="760" y="90" width="290" height="660" rx="14" fill="#E8F5E9" fill-opacity="0.35" stroke="#A5D6A7" stroke-dasharray="6 5"/>
  <text x="776" y="112" class="zt" fill="#2E7D32">PIA VPN Exit (tunnel · NAT)</text>

  <rect x="1090" y="90" width="280" height="660" rx="14" fill="#ECEFF1" fill-opacity="0.55" stroke="#B0BEC5" stroke-dasharray="6 5"/>
  <text x="1106" y="112" class="zt" fill="#455A64">Internet &amp; External Services</text>

  <!-- ===================== LOCAL NODES ===================== -->
  <!-- Device -->
  <rect x="65" y="160" width="220" height="160" rx="12" fill="#ffffff" stroke="#1E88E5" stroke-width="2"/>
  <rect x="82" y="174" width="28" height="48" rx="5" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5"/>
  <rect x="86" y="181" width="20" height="34" fill="#BBDEFB"/>
  <line x1="92" y1="219" x2="100" y2="219" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="122" y="196" class="nt">📱 Device (this app)</text>
  <text x="80" y="232" class="ns">192.168.1.100</text>
  <text x="80" y="250" class="ns">WG iface: 10.0.1.2/32</text>
  <text x="80" y="268" class="ns">HttpClient · sockets · dartssh2</text>
  <text x="80" y="286" class="ns">→ all traffic via router</text>
  <text x="80" y="304" class="nss">(no direct internet path)</text>

  <!-- Router (jagged top) -->
  <path d="M65,535 L65,705 L285,705 L285,535 L272,523 L259,535 L246,523 L233,535 L220,523 L207,535 L194,523 L181,535 L168,523 L155,535 L142,523 L129,535 L116,523 L103,535 L90,523 L77,535 L65,523 Z" fill="#ffffff" stroke="#F44336" stroke-width="2"/>
  <text x="82" y="562" class="nt">⛂ Router — ASUS Merlin</text>
  <text x="82" y="584" class="ns">192.168.1.1  (gateway / NAT)</text>
  <text x="82" y="602" class="nss">app field default: 192.168.0.254</text>
  <text x="82" y="620" class="ns">SSH :22 · nvram / wg / service</text>
  <text x="82" y="638" class="ns">WireGuard client wgc1–wgc5</text>
  <text x="82" y="656" class="ns">establishes the tunnel; reads</text>
  <text x="82" y="674" class="ns">wgcN_rip = pool public IP</text>
  <text x="82" y="694" class="nss">→ forwards all device traffic</text>

  <!-- Device <-> Router (all traffic) -->
  <path class="flow" stroke="#455A64" stroke-width="3.6" marker-start="url(#asl)" marker-end="url(#asl)" d="M168,322 L168,514"/>
  <path class="flow" stroke="#F44336" stroke-width="2.4" marker-start="url(#ar)" marker-end="url(#ar)" d="M198,322 L198,514"/>
  <g><rect class="lbg" x="36" y="395" width="120" height="18" rx="4"/><text x="40" y="408" class="lb" fill="#37474F">ALL traffic ⇅</text></g>
  <g><rect class="lbg" x="36" y="415" width="120" height="18" rx="4"/><text x="40" y="428" class="lb" fill="#37474F">(NAT gateway)</text></g>
  <g><rect class="lbg" x="210" y="397" width="86" height="18" rx="4"/><text x="214" y="410" class="lb" fill="#C62828">SSH 22 ⇅</text></g>
  <g><rect class="lbg" x="210" y="417" width="104" height="18" rx="4"/><text x="214" y="430" class="lb" fill="#C62828">push to router</text></g>

  <!-- ===================== PIA INFRA NODES ===================== -->
  <!-- serverlist -->
  <path d="M395,172 A145,12 0 0 1 685,172 L685,236 A145,12 0 0 1 395,236 Z" fill="#ffffff" stroke="#1E88E5" stroke-width="2"/>
  <ellipse cx="540" cy="172" rx="145" ry="12" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
  <text x="540" y="191" text-anchor="middle" class="nt" style="font-size:13px">serverlist.piaservers.net</text>
  <text x="540" y="209" text-anchor="middle" class="ns">e.g. 160.79.104.10 : 443</text>
  <text x="540" y="225" text-anchor="middle" class="ns">GET /vpninfo/servers/v6</text>

  <!-- token -->
  <path d="M395,297 A145,12 0 0 1 685,297 L685,361 A145,12 0 0 1 395,361 Z" fill="#ffffff" stroke="#1E88E5" stroke-width="2"/>
  <ellipse cx="540" cy="297" rx="145" ry="12" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
  <text x="540" y="316" text-anchor="middle" class="nt" style="font-size:13px">www.privateinternetaccess.com</text>
  <text x="540" y="334" text-anchor="middle" class="ns">e.g. 104.18.30.10 : 443</text>
  <text x="540" y="350" text-anchor="middle" class="ns">POST /gtoken/generateToken · Basic</text>

  <!-- WG servers -->
  <path d="M395,432 A145,12 0 0 1 685,432 L685,588 A145,12 0 0 1 395,588 Z" fill="#ffffff" stroke="#7B1FA2" stroke-width="2"/>
  <ellipse cx="540" cy="432" rx="145" ry="12" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="540" y="457" text-anchor="middle" class="nt" style="font-size:13px">PIA WireGuard servers</text>
  <text x="540" y="475" text-anchor="middle" class="ns">e.g. 143.244.50.40 (CN-pinned)</text>
  <text x="540" y="493" text-anchor="middle" class="ns">: 1337 — TCP probe + HTTPS /addKey</text>
  <text x="540" y="511" text-anchor="middle" class="ns">: 51820 — UDP WireGuard tunnel</text>
  <text x="540" y="531" text-anchor="middle" class="ns">tunnel entry → decrypt → 172.16.x</text>
  <text x="540" y="551" text-anchor="middle" class="nss">CA pin: pia-foss ca.rsa.4096.crt</text>
  <text x="540" y="569" text-anchor="middle" class="nss">(verifies the /addKey certificate)</text>

  <!-- ===================== VPN EXIT NODES ===================== -->
  <!-- PIA internal network -->
  <rect x="795" y="165" width="220" height="160" rx="10" fill="#ffffff" stroke="#43A047" stroke-width="2"/>
  <text x="905" y="190" text-anchor="middle" class="nt" style="font-size:13px">PIA internal network</text>
  <text x="905" y="210" text-anchor="middle" class="ns">172.16.0.0/16</text>
  <rect x="825" y="228" width="160" height="74" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="905" y="250" text-anchor="middle" class="ns">tunnel peer (server iface)</text>
  <text x="905" y="272" text-anchor="middle" class="nt" style="font-size:13px;fill:#2E7D32">172.16.1.50</text>
  <text x="905" y="291" text-anchor="middle" class="nss">decrypted traffic</text>

  <!-- Public IP pool (stacked rectangles) -->
  <text x="905" y="412" text-anchor="middle" class="zt" fill="#2E7D32">PIA Public IP Pool</text>
  <rect x="828" y="428" width="185" height="58" rx="8" fill="#C8E6C9" stroke="#43A047" stroke-width="1.5"/>
  <rect x="818" y="444" width="185" height="58" rx="8" fill="#A5D6A7" stroke="#43A047" stroke-width="1.5"/>
  <rect x="808" y="460" width="185" height="58" rx="8" fill="#81C784" stroke="#2E7D32" stroke-width="1.8"/>
  <text x="900" y="483" text-anchor="middle" class="nt" style="font-size:13px">egress source IP (NAT)</text>
  <text x="900" y="503" text-anchor="middle" class="ns" style="fill:#1B5E20">185.230.125.10 – .50</text>

  <!-- ===================== INTERNET NODES ===================== -->
  <g transform="translate(1095,150) scale(1.45)">
    <path d="M 50 100 C 20 100 10 80 28 66 C 18 44 44 28 64 40 C 72 18 110 18 120 40 C 150 30 172 54 156 74 C 178 84 168 100 146 100 Z" fill="#ffffff" stroke="#455A64" stroke-width="1.6"/>
  </g>
  <text x="1232" y="232" text-anchor="middle" class="nt" style="font-size:14px">☁ Internet (public)</text>
  <text x="1232" y="253" text-anchor="middle" class="ns">any destination</text>
  <text x="1232" y="271" text-anchor="middle" class="nss">sees source 185.230.125.x</text>

  <!-- Internet Services / CDN / DNS -->
  <rect x="1108" y="415" width="248" height="315" rx="10" fill="#ffffff" stroke="#90A4AE" stroke-width="2"/>
  <text x="1232" y="438" text-anchor="middle" class="nt" style="font-size:13px">Internet Services</text>
  <text x="1232" y="456" text-anchor="middle" class="ns">CDN · DNS · web links</text>
  <rect x="1124" y="472" width="216" height="72" rx="8" fill="#F5F7F8" stroke="#B0BEC5" stroke-width="1.2"/>
  <text x="1232" y="492" text-anchor="middle" class="nss">raw.githubusercontent.com</text>
  <text x="1232" y="509" text-anchor="middle" class="nss">GitHub CDN — CA cert</text>
  <text x="1232" y="527" text-anchor="middle" class="lb" fill="#1565C0">HTTPS 443</text>
  <rect x="1124" y="556" width="216" height="64" rx="8" fill="#F5F7F8" stroke="#B0BEC5" stroke-width="1.2"/>
  <text x="1232" y="576" text-anchor="middle" class="nss">DNS resolver (Quad9 9.9.9.9)</text>
  <text x="1232" y="596" text-anchor="middle" class="lb" fill="#616161">DNS 53</text>
  <rect x="1124" y="632" width="216" height="68" rx="8" fill="#F5F7F8" stroke="#B0BEC5" stroke-width="1.2"/>
  <text x="1232" y="652" text-anchor="middle" class="nss">web links (url_launcher)</text>
  <text x="1232" y="670" text-anchor="middle" class="nss">github.com · exponentiallydigital.com</text>
  <text x="1232" y="688" text-anchor="middle" class="lb" fill="#1565C0">HTTPS 443</text>

  <!-- ===================== CONTROL-PLANE FLOWS (Router -> PIA Infra) ===================== -->
  <path class="flow" stroke="#1E88E5" marker-start="url(#ab)" marker-end="url(#ab)" d="M286,545 Q345,360 393,205"/>
  <path class="flow" stroke="#1E88E5" marker-start="url(#ab)" marker-end="url(#ab)" d="M286,575 Q348,445 393,322"/>
  <path class="flow" stroke="#FF9800" stroke-width="1.2" opacity="0.45" d="M286,594 Q345,512 393,464"/>
  <path class="flow" stroke="#FF9800" stroke-width="1.2" opacity="0.45" d="M286,606 Q345,528 393,480"/>
  <path class="flow" stroke="#FF9800" marker-start="url(#ao)" marker-end="url(#ao)" d="M286,600 Q345,520 393,472"/>
  <path class="flow" stroke="#9C27B0" marker-start="url(#ap)" marker-end="url(#ap)" d="M286,635 Q348,562 393,512"/>
  <path class="flow" stroke="#4CAF50" marker-start="url(#ag)" marker-end="url(#ag)" d="M286,665 Q348,605 393,550"/>

  <g><rect class="lbg" x="296" y="347" width="82" height="18" rx="4"/><text x="300" y="360" class="lb" fill="#1565C0">HTTPS 443</text></g>
  <g><rect class="lbg" x="296" y="432" width="82" height="18" rx="4"/><text x="300" y="445" class="lb" fill="#1565C0">HTTPS 443</text></g>
  <g><rect class="lbg" x="294" y="507" width="100" height="18" rx="4"/><text x="298" y="520" class="lb" fill="#E65100">TCP 1337 ×N</text></g>
  <g><rect class="lbg" x="294" y="549" width="108" height="18" rx="4"/><text x="298" y="562" class="lb" fill="#6A1B9A">HTTPS 1337 🔒</text></g>
  <g><rect class="lbg" x="294" y="595" width="104" height="18" rx="4"/><text x="298" y="608" class="lb" fill="#2E7D32">UDP 51820 ⇄</text></g>

  <!-- ===================== DATA-PLANE EGRESS CHAIN ===================== -->
  <!-- WG server -> PIA internal -->
  <path class="flow" stroke="#4CAF50" marker-start="url(#ag)" marker-end="url(#ag)" d="M685,510 Q745,380 793,250"/>
  <g><rect class="lbg" x="688" y="357" width="150" height="18" rx="4"/><text x="692" y="370" class="lb" fill="#2E7D32">decrypt → 172.16.1.50</text></g>

  <!-- PIA internal -> pool -->
  <path class="flow" stroke="#4CAF50" marker-start="url(#ag)" marker-end="url(#ag)" d="M905,327 L905,423"/>
  <g><rect class="lbg" x="912" y="366" width="86" height="18" rx="4"/><text x="916" y="379" class="lb" fill="#2E7D32">source NAT</text></g>

  <!-- pool -> Internet -->
  <path class="flow" stroke="#4CAF50" marker-start="url(#ag)" marker-end="url(#ag)" d="M992,470 Q1075,360 1140,290"/>
  <g><rect class="lbg" x="996" y="386" width="170" height="18" rx="4"/><text x="1000" y="399" class="lb" fill="#2E7D32">egress · src 185.230.125.x</text></g>

  <!-- Internet -> Internet Services (tunnelled application flows) -->
  <path class="enc" stroke="#455A64" marker-start="url(#asl)" marker-end="url(#asl)" d="M1232,298 L1232,411"/>
  <g><rect class="lbg" x="1238" y="338" width="132" height="18" rx="4"/><text x="1242" y="351" class="lb" fill="#37474F">HTTPS 443 · DNS 53</text></g>
  <g><rect class="lbg" x="1118" y="356" width="120" height="18" rx="4"/><text x="1122" y="369" class="nss" fill="#607D8B">(carried by tunnel)</text></g>

  <!-- ===================== LEGEND ===================== -->
  <rect x="30" y="775" width="1340" height="155" rx="12" fill="#FAFAFA" stroke="#CFD8DC"/>
  <text x="46" y="800" class="zt" fill="#37474F">Legend — colour = protocol/port · double arrow ⇄ = bidirectional (request ⁄ response) · dashed = application flow tunnelled (encapsulated)</text>

  <!-- row 1 -->
  <line x1="50" y1="828" x2="92" y2="828" stroke="#1E88E5" stroke-width="2.6" marker-start="url(#ab)" marker-end="url(#ab)"/>
  <text x="100" y="832" class="lb" fill="#37474F">HTTPS 443 — server list, token, CA cert, web links</text>
  <line x1="500" y1="828" x2="542" y2="828" stroke="#FF9800" stroke-width="2.6" marker-end="url(#ao)"/>
  <text x="550" y="832" class="lb" fill="#37474F">TCP 1337 — latency probes (× N)</text>
  <line x1="900" y1="828" x2="942" y2="828" stroke="#9C27B0" stroke-width="2.6" marker-end="url(#ap)"/>
  <text x="950" y="832" class="lb" fill="#37474F">HTTPS 1337 — WG key reg (cert-pinned)</text>

  <!-- row 2 -->
  <line x1="50" y1="862" x2="92" y2="862" stroke="#4CAF50" stroke-width="2.6" marker-start="url(#ag)" marker-end="url(#ag)"/>
  <text x="100" y="866" class="lb" fill="#37474F">UDP 51820 — WireGuard tunnel + VPN egress chain</text>
  <line x1="500" y1="862" x2="542" y2="862" stroke="#F44336" stroke-width="2.6" marker-end="url(#ar)"/>
  <text x="550" y="866" class="lb" fill="#37474F">SSH 22 — router push</text>
  <line x1="900" y1="862" x2="942" y2="862" stroke="#9E9E9E" stroke-width="2.6" marker-end="url(#ay)"/>
  <text x="950" y="866" class="lb" fill="#37474F">DNS 53 — name resolution</text>

  <!-- row 3 -->
  <line x1="50" y1="896" x2="92" y2="896" stroke="#455A64" stroke-width="3.4" marker-start="url(#asl)" marker-end="url(#asl)"/>
  <text x="100" y="900" class="lb" fill="#37474F">device ⇄ router (NAT) — all traffic</text>
  <line x1="500" y1="896" x2="542" y2="896" stroke="#455A64" stroke-width="2.2" stroke-dasharray="8 5"/>
  <text x="550" y="900" class="lb" fill="#37474F">application flow tunnelled (encapsulated)</text>
  <line x1="900" y1="896" x2="942" y2="896" stroke="#FFC107" stroke-width="2.6"/>
  <text x="950" y="900" class="lb" fill="#9E9E9E">ICMP — not used by the app</text>
</svg>
